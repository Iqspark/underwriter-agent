server:
  port: 8080

spring:
  application:
    name: underwriter-agent

  # Persistence. Default is an embedded H2 database so the app and tests run with no external
  # infrastructure. For production, activate the 'prod' profile (Postgres) — see the bottom of this file.
  datasource:
    url: ${DB_URL:jdbc:h2:mem:underwriter;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update      # dev/H2 convenience; production should use migrations (Flyway) — see doc 16
    open-in-view: false
    properties:
      hibernate.format_sql: false

  # Spring AI model auto-config is active by default (matchIfMissing=true) and eagerly builds the
  # Anthropic API / transformers embedding at startup — which fails with no key / needs a download.
  # Disable it by default; RagConfig supplies the embedding + vector store when RAG is enabled.
  # To use Claude generation in RAG, set chat: anthropic and spring.ai.anthropic.api-key.
  ai:
    model:
      chat: none
      embedding: none

# Actuator: expose health, metrics and the Prometheus scrape endpoint (baseline observability).
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# OpenAPI / Swagger UI (interactive API docs).
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# AI underwriting agent configuration.
underwriter:
  # The historical "book of business" the agent learns from. A deterministic synthetic book is
  # generated at startup; replace HistoricalPolicyRepository.load() with a real data source for production.
  history:
    size: 1500      # number of synthetic historical policies to generate
    seed: 42        # RNG seed (deterministic book for reproducibility/tests)
  similarity:
    k: 25           # number of nearest comparable policies used per assessment
    index: bruteforce   # bruteforce (exact) | ann (LSH offline; pgvector HNSW in prod) — ADR-0023
  # Hybrid predictive model (ADR-0020): the trained model predicts claim probability and is blended
  # with the k-NN signal; k-NN still supplies the comparable cases (explanation). blend: max|mean|model|knn.
  model:
    enabled: true
    blend: max
  llm:
    anthropic:
      # api-key is intentionally NOT set here, so the app runs fully offline with the
      # deterministic template reasoner by default. To use Claude for the written rationale,
      # set the property via an environment variable:
      #   UNDERWRITER_LLM_ANTHROPIC_API_KEY=sk-ant-...
      # (Spring relaxed binding maps that env var to underwriter.llm.anthropic.api-key.)
      model: claude-sonnet-4-6

  # Baseline security (Phase 1). Offline default = HTTP Basic with in-memory role users.
  # To switch to production OIDC resource-server mode, set
  # spring.security.oauth2.resourceserver.jwt.issuer-uri (see the prod profile below).
  security:
    dev-password: ${UNDERWRITER_DEV_PASSWORD:changeit}   # dev/offline Basic-auth users only

  # Underwriting authority limits + four-eyes (owned by UW leadership; defaults are illustrative).
  authority:
    underwriter-limit: 1000000
    senior-limit: 10000000
    four-eyes-threshold: 5000000

  # RAG grounding (Phase 2). Disabled by default so the app runs offline with no model download.
  # When true: ingests the corpus into a vector store (in-memory by default; pgvector via the
  # 'pgvector' Maven profile) using in-process ONNX embeddings, retrieves grounding per submission,
  # adds an advisory finding (capped severity, never KNOCKOUT), and writes a cited rationale.
  rag:
    enabled: false
    top-k: 4              # chunks retrieved per query (broadened across source types)
    min-score: 0.6        # drop weak matches
    max-severity: MEDIUM  # cap on the advisory RAG finding

  # Reviewer agent (ADR-0022): a final coherence check on the assembled decision. Deterministic
  # checks always run (e.g. the rationale must reflect every knockout); an LLM critic runs too when
  # a chat model is configured. Advisory only — it flags and recommends human review, never decides.
  reviewer:
    enabled: true

  # Autonomy tiers / STP routing (ADR-0025). Classifies each decision as AUTO (straight-through,
  # within bounds), ASSISTED, or SPECIALIST. Bounds are illustrative — calibrate + governance-gate
  # before enabling real straight-through binding. QA-sample 100% of auto-approvals initially.
  autonomy:
    enabled: true
    max-coverage: 750000
    specialist-coverage: 2000000
    claim-probability-max: 0.15
    loss-ratio-max: 0.5
    require-high-confidence: true
    qa-sample-rate: 1.0

  # Event-driven runtime (Phase 3, lean tier): async case lifecycle + durable state machine + outbox.
  # async=true processes off the request thread (after commit); set false to process inline.
  # Graduate to Kafka + Temporal later without changing the seams.
  runtime:
    async: true
    max-attempts: 3
    outbox-poll-ms: 5000

  # MCP enrichment (Phase 4). Default provider is offline/deterministic; point at MCP tool servers
  # (geocoding, flood/wildfire/wind/crime, property) in production behind the same EnrichmentProvider
  # seam. Unavailable enrichment degrades to book-only signals — it never fails a submission.
  enrichment:
    enabled: true
    cache-ttl-seconds: 3600
    high-threshold: 0.7

  # Phase 5 intake: semantic feature extraction from a submission's unstructured `notes`
  # (inspection report / broker email). Uses the LLM when a chat model is configured, else a
  # deterministic keyword heuristic. Advisory findings today; predictive-model input later (ADR-0021).
  intake:
    semantic-features-enabled: true

# Spring AI (used only when underwriter.rag.enabled=true). Set the Anthropic key to enable the
# grounded LLM rationale; otherwise RAG still grounds + cites offline via the template reasoner.
# spring:
#   ai:
#     anthropic:
#       api-key: ${UNDERWRITER_LLM_ANTHROPIC_API_KEY:}
#     vectorstore:
#       pgvector:                 # only with the 'pgvector' Maven profile + a Postgres with 'vector'
#         initialize-schema: true
#         dimensions: 384
#         index-type: HNSW

logging:
  level:
    com.iqspark.underwriter: INFO

---
# Production profile: PostgreSQL. Activate with --spring.profiles.active=prod (and set DB_* env vars).
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/underwriter}
    username: ${DB_USER:underwriter}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate    # production schema is managed by migrations, not auto-ddl
  # Enable OIDC resource-server mode in production by setting the issuer-uri (then HTTP Basic is off):
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         issuer-uri: ${OIDC_ISSUER_URI:}
