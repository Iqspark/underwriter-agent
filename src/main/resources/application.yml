server:
  port: 8080

spring:
  application:
    name: underwriter-agent

  # Persistence. Default is an embedded H2 database so the app and tests run with no external
  # infrastructure. For production, activate the 'prod' profile (Postgres) — see the bottom of this file.
  datasource:
    url: ${DB_URL:jdbc:h2:mem:underwriter;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update      # dev/H2 convenience; production should use migrations (Flyway) — see doc 16
    open-in-view: false
    properties:
      hibernate.format_sql: false

# Actuator: expose health, metrics and the Prometheus scrape endpoint (baseline observability).
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# OpenAPI / Swagger UI (interactive API docs).
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# AI underwriting agent configuration.
underwriter:
  # The historical "book of business" the agent learns from. A deterministic synthetic book is
  # generated at startup; replace HistoricalPolicyRepository.load() with a real data source for production.
  history:
    size: 1500      # number of synthetic historical policies to generate
    seed: 42        # RNG seed (deterministic book for reproducibility/tests)
  similarity:
    k: 25           # number of nearest comparable policies used per assessment
  llm:
    anthropic:
      # api-key is intentionally NOT set here, so the app runs fully offline with the
      # deterministic template reasoner by default. To use Claude for the written rationale,
      # set the property via an environment variable:
      #   UNDERWRITER_LLM_ANTHROPIC_API_KEY=sk-ant-...
      # (Spring relaxed binding maps that env var to underwriter.llm.anthropic.api-key.)
      model: claude-sonnet-4-6

  # Baseline security (Phase 1). Offline default = HTTP Basic with in-memory role users.
  # To switch to production OIDC resource-server mode, set
  # spring.security.oauth2.resourceserver.jwt.issuer-uri (see the prod profile below).
  security:
    dev-password: ${UNDERWRITER_DEV_PASSWORD:changeit}   # dev/offline Basic-auth users only

  # Underwriting authority limits + four-eyes (owned by UW leadership; defaults are illustrative).
  authority:
    underwriter-limit: 1000000
    senior-limit: 10000000
    four-eyes-threshold: 5000000

logging:
  level:
    com.iqspark.underwriter: INFO

---
# Production profile: PostgreSQL. Activate with --spring.profiles.active=prod (and set DB_* env vars).
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/underwriter}
    username: ${DB_USER:underwriter}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate    # production schema is managed by migrations, not auto-ddl
  # Enable OIDC resource-server mode in production by setting the issuer-uri (then HTTP Basic is off):
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         issuer-uri: ${OIDC_ISSUER_URI:}
